---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: bank
  labels:
    app: account-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: account-service
          # Ganti dengan image dari minikube registry setelah build:
          # eval $(minikube docker-env) && docker build -t account-service:latest -f account-service/Dockerfile .
          image: account-service:latest
          imagePullPolicy: Never   # pakai image lokal minikube, jangan pull dari registry
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          envFrom:
            - configMapRef:
                name: account-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15

---
# HTTP service — diakses oleh client & k6
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: bank
spec:
  type: NodePort
  selector:
    app: account-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
    - name: grpc
      port: 50051
      targetPort: 50051
