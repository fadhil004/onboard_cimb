syntax = "proto3";

package fraud;

option go_package = "proto/fraudpb";

service FraudDetectionService {
  // CheckTransaction — called by transaction-service before every transfer
  rpc CheckTransaction(FraudCheckRequest) returns (FraudCheckResponse);

  // BlockAccount — manual / parameterized block by operator
  rpc BlockAccount(BlockAccountRequest) returns (BlockAccountResponse);

  // UnblockAccount — remove a manual block
  rpc UnblockAccount(UnblockAccountRequest) returns (UnblockAccountResponse);

  // GetAccountStatus — inspect fraud / block state of an account
  rpc GetAccountStatus(GetAccountStatusRequest) returns (GetAccountStatusResponse);
}

// ─── CheckTransaction ─────────────────────────────────────────────────────────

message FraudCheckRequest {
  string source_account_no      = 1;
  string beneficiary_account_no = 2;
  double amount                 = 3;
  string currency               = 4;
  string partner_reference_no   = 5;
  string transaction_date       = 6;
}

message FraudCheckResponse {
  bool   allowed    = 1; // true = proceed, false = reject
  string fraud_code = 2; // "OK" | "BLOCKED_ACCOUNT" | "VELOCITY_BREACH" | ...
  string message    = 3;
  string risk_level = 4; // "LOW" | "MEDIUM" | "HIGH" | "CRITICAL"
}

// ─── BlockAccount ─────────────────────────────────────────────────────────────

message BlockAccountRequest {
  string account_no = 1;
  string reason     = 2;
  string blocked_by = 3;
}

message BlockAccountResponse {
  bool   success = 1;
  string message = 2;
}

// ─── UnblockAccount ───────────────────────────────────────────────────────────

message UnblockAccountRequest {
  string account_no   = 1;
  string unblocked_by = 2;
}

message UnblockAccountResponse {
  bool   success = 1;
  string message = 2;
}

// ─── GetAccountStatus ─────────────────────────────────────────────────────────

message GetAccountStatusRequest {
  string account_no = 1;
}

message GetAccountStatusResponse {
  string account_no    = 1;
  bool   is_blocked    = 2;
  string block_reason  = 3;
  string blocked_by    = 4;
  string blocked_at    = 5;
  int32  velocity_count = 6;
}
